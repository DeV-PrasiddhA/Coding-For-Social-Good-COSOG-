<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Daily Dose</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>&#9749; AI Daily Dose</h1>
            <p class="subtitle">Get a random activity, a random joke, and an AI-powered motivational plan.</p>
            <div id="api-status" class="badge badge-warn">Checking API...</div>
        </header>

        <div class="controls">
            <button id="generate-btn" class="btn-primary">Generate My Daily Dose</button>
            <button id="settings-btn" class="btn-secondary" title="API Settings">&#9881;</button>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Brewing your daily dose...</p>
        </div>

        <div id="error-box" class="error-box hidden"></div>

        <div id="result" class="result hidden">
            <div class="cards">
                <div class="card">
                    <h3>&#127939; Random Activity</h3>
                    <p id="activity-text"></p>
                    <span id="activity-type" class="tag"></span>
                </div>
                <div class="card">
                    <h3>&#128514; Random Joke</h3>
                    <p id="joke-setup"></p>
                    <p id="joke-punchline" class="tag" style="margin-top:0.5rem;display:block;"></p>
                </div>
            </div>
            <div id="ai-report" class="ai-report"></div>
        </div>

        <div id="settings-modal" class="modal hidden">
            <div class="modal-content">
                <h3>API Key Settings</h3>
                <p>Enter your Gemini API key. Get one free at <a href="https://aistudio.google.com/" target="_blank">Google AI Studio</a>.</p>
                <input type="password" id="key-input" placeholder="AIzaSy..." />
                <div class="modal-actions">
                    <button id="key-clear" class="btn-danger">Clear</button>
                    <button id="key-save" class="btn-primary">Save</button>
                    <button id="key-close" class="btn-secondary">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
